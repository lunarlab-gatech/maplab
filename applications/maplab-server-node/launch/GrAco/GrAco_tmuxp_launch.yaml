session_name: maplab_server_GrAco

environment:
  DATASET_NUM: V1.0

options:
  default-command: /bin/bash

windows:
- window_name: main
  layout: tiled
  focus: true
  shell_command_before:
  - source /opt/ros/noetic/setup.bash
  - source /home/$(id -un)/maplab_ws/devel/setup.bash
  panes:
  - shell_command:
    - roscore
  - shell_command:
    - sleep 3
    - roslaunch maplab_server_node GrAco-maplab-server-base-station.launch dataset_number:=${DATASET_NUM}
  - shell_command:
    - sleep 2
    # - mkdir -p /home/$(id -un)/data/Data/GrAco_dataset${DATASET_NUM}/results/maplab_results/rovioli/Husky1/
    - roslaunch maplab_server_node GrAco-maplab-server-robots.launch dataset_number:=${DATASET_NUM}
  - shell_command:
    - rviz -d /home/$(id -un)/maplab_ws/src/maplab/applications/maplab-server-node/launch/GrAco/ros/GrAco_rviz.rviz
